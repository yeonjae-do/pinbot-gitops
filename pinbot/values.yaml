replicaCount: 1

image:
  repository: 192.168.90.53/pinbot/pinbot-exaone
  tag: "1.2b"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-secret

nameOverride: ""
fullnameOverride: "pinbot-exaone"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false

nodeSelector:
  gpu: "true"

resources: {}

container:
  port: 8000
  env:
    - name: ENV
      value: "dev"

