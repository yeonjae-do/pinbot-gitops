apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinbot-exaone
  namespace: pinbot
  labels:
    app: pinbot-exaone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pinbot-exaone
  template:
    metadata:
      labels:
        app: pinbot-exaone
    spec:
      imagePullSecrets:
        - name: harbor-secret

      nodeSelector:
        gpu: "true"

      containers:
        - name: pinbot-exaone
          image: "192.168.90.53/pinbot/pinbot-exaone:1.2b"
          imagePullPolicy: IfNotPresent

          env:
            - name: ENV
              value: dev

          ports:
            - containerPort: 8080

          resources:
            limits:
              nvidia.com/gpu: 1

          volumeMounts:
            - name: weights
              mountPath: /weights

            - name: dshm
              mountPath: /dev/shm

      volumes:
        - name: weights
          nfs:
            server: 192.168.90.51
            path: /srv/pinbot/weights

        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
